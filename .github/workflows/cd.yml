name: CD — Deploy

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy API to Render
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    steps:
      - name: Trigger Render deploy (API)
        # Render gives a deploy hook URL per service — set RENDER_API_DEPLOY_HOOK
        # in GitHub secrets. Get it from: Render → Service → Settings → Deploy Hook
        run: |
          if [ -n "${{ secrets.RENDER_API_DEPLOY_HOOK }}" ]; then
            curl -sS -X POST "${{ secrets.RENDER_API_DEPLOY_HOOK }}" | jq .
          else
            echo "RENDER_API_DEPLOY_HOOK not set — Render auto-deploys from GitHub directly"
          fi

      - name: Trigger Render deploy (Worker)
        run: |
          if [ -n "${{ secrets.RENDER_WORKER_DEPLOY_HOOK }}" ]; then
            curl -sS -X POST "${{ secrets.RENDER_WORKER_DEPLOY_HOOK }}" | jq .
          else
            echo "RENDER_WORKER_DEPLOY_HOOK not set — Render auto-deploys from GitHub directly"
          fi

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm install --legacy-peer-deps

      - name: Deploy to Vercel
        run: |
          npx vercel --token=${{ secrets.VERCEL_TOKEN }} \
            --prod \
            --yes \
            --scope=${{ secrets.VERCEL_ORG_ID }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  smoke-test:
    name: Smoke Test Production
    runs-on: ubuntu-latest
    needs: [deploy-backend]
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Wait for Render to finish deploying
        run: sleep 60

      - name: Health check — liveness
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://speedfast-api.onrender.com/health/live)
          echo "Liveness status: $STATUS"
          [ "$STATUS" = "200" ] || (echo "❌ Liveness check failed" && exit 1)

      - name: Health check — readiness
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://speedfast-api.onrender.com/health/ready)
          echo "Readiness status: $STATUS"
          [ "$STATUS" = "200" ] || (echo "❌ Readiness check failed" && exit 1)

      - name: API smoke test — register + login
        run: |
          # Register a smoke-test user (409 is fine if it already exists)
          curl -s -X POST https://speedfast-api.onrender.com/api/v1/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"smoketest@speedfast.vn","password":"Smoke123!"}' | jq .

          # Login and assert we get a token back
          RESULT=$(curl -s -X POST https://speedfast-api.onrender.com/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"smoketest@speedfast.vn","password":"Smoke123!"}')
          echo "$RESULT" | jq .
          echo "$RESULT" | jq -e '.accessToken' > /dev/null \
            || (echo "❌ Login smoke test failed — no accessToken in response" && exit 1)
          echo "✅ Smoke tests passed"
